name: Build AegisOS ISO

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-iso:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # We bypass compilation entirely to save you 15 minutes!
      # We download the already-compiled ISO artifact from your previous successful run (ID: 27185513950)
      - name: Download Pre-compiled ISO Artifact
        uses: actions/download-artifact@v4
        with:
          name: AegisOS-ISO
          run-id: 27190248113
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: out/

      - name: Split and Upload to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Locating downloaded ISO file..."
          ISO_FILE=$(ls out/*.iso | head -n 1)
          echo "Splitting $ISO_FILE into 1.2GB parts to bypass the GitHub 2GB release size limit..."
          split -b 1200M "$ISO_FILE" out/aegis-os-latest.iso.part
          
          echo "Managing Git tags and releases..."
          gh release delete latest --yes || true
          git tag -d latest || true
          git push origin :refs/tags/latest || true
          
          echo "Uploading AegisOS release assets..."
          gh release create latest out/aegis-os-latest.iso.part* --title "AegisOS Latest Build" --notes "Automated cloud build of AegisOS."
          
          echo "=========================================================="
          echo "AEGISOS DIRECT DOWNLOAD LINKS FOR COLAB:"
          echo "https://github.com/${{ github.repository }}/releases/download/latest/aegis-os-latest.iso.partaa"
          echo "https://github.com/${{ github.repository }}/releases/download/latest/aegis-os-latest.iso.partab"
          echo "=========================================================="
