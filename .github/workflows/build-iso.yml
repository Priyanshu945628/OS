name: Build AegisOS ISO

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: # Allows manual trigger from the Actions tab

jobs:
  build-iso:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Free Disk Space
        run: |
          # Archiso builds require substantial disk space (~15GB). We clean default tooling to prevent Out-Of-Space errors.
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"

      - name: Build AegisOS Builder Container
        run: |
          docker build -t aegis-builder .

      - name: Compile ISO
        run: |
          # We execute mkarchiso inside the privileged container.
          # GitHub Actions Ubuntu runners support running privileged Docker containers.
          docker run --privileged --rm -v ${{ github.workspace }}:/build aegis-builder ./build.sh

      - name: Upload Bootable ISO Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AegisOS-ISO
          path: out/*.iso
          retention-days: 5

      - name: Create or Update GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Preparing ISO file..."
          mv out/*.iso out/aegis-os-latest.iso
          
          echo "Managing Git tags and releases..."
          gh release delete latest --yes || true
          git tag -d latest || true
          git push origin :refs/tags/latest || true
          
          echo "Uploading AegisOS release assets..."
          gh release create latest out/aegis-os-latest.iso --title "AegisOS Latest Build" --notes "Automated cloud build of AegisOS latest ISO."
          
          echo "=========================================================="
          echo "AEGISOS STATIC DIRECT DOWNLOAD LINK:"
          echo "https://github.com/${{ github.repository }}/releases/download/latest/aegis-os-latest.iso"
          echo "=========================================================="
