name: Build AegisOS ISO

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-iso:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # We bypass compilation entirely to save you 15 minutes!
      # We download the already-compiled ISO artifact from your previous successful run (ID: 27185513950)
      - name: Download Pre-compiled ISO Artifact
        uses: actions/download-artifact@v4
        with:
          name: AegisOS-ISO
          run-id: 27190248113
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: out/

      - name: Upload to transfer.whalebone.io (Supports files up to 10GB)
        run: |
          echo "Locating downloaded ISO file..."
          ISO_FILE=$(ls out/*.iso | head -n 1)
          echo "Uploading $ISO_FILE to transfer.whalebone.io (this will take 1-2 minutes)..."
          
          # Upload and capture response
          RESPONSE=$(curl -s --upload-file "$ISO_FILE" https://transfer.whalebone.io/aegis-os-latest.iso)
          echo "Response: $RESPONSE"
          
          echo "=========================================================="
          echo "AEGISOS DIRECT DOWNLOAD LINK:"
          echo "$RESPONSE"
          echo "=========================================================="
