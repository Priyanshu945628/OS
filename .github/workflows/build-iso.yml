name: Build AegisOS ISO

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-iso:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # We bypass compilation entirely to save you 15 minutes!
      # We download the already-compiled ISO artifact from your previous successful run (ID: 27185513950)
      - name: Download Pre-compiled ISO Artifact
        uses: actions/download-artifact@v4
        with:
          name: AegisOS-ISO
          run-id: 27185513950
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: out/

      - name: Upload to Pixeldrain (Supports files > 2GB)
        run: |
          echo "Locating downloaded ISO file..."
          ISO_FILE=$(ls out/*.iso | head -n 1)
          echo "Uploading $ISO_FILE to Pixeldrain (this will take 1-2 minutes)..."
          
          # Upload and capture JSON response
          RESPONSE=$(curl -s -T "$ISO_FILE" https://pixeldrain.com/api/file/)
          echo "Response: $RESPONSE"
          
          # Extract file ID using python
          FILE_ID=$(echo "$RESPONSE" | python3 -c "import sys, json; print(json.load(sys.stdin)['id'])")
          
          echo "=========================================================="
          echo "AEGISOS DIRECT DOWNLOAD LINK:"
          echo "https://pixeldrain.com/api/file/$FILE_ID"
          echo "=========================================================="
