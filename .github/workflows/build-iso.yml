name: Build AegisOS ISO

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-iso:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # We bypass compilation entirely to save you 15 minutes!
      # We download the already-compiled ISO artifact from your previous successful run (ID: 27185513950)
      - name: Download Pre-compiled ISO Artifact
        uses: actions/download-artifact@v4
        with:
          name: AegisOS-ISO
          run-id: 27190248113
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: out/

      - name: Upload to Gofile (Supports files > 2GB)
        run: |
          python upload_gofile.py
