#!/usr/sbin/nft -f
# ==========================================
# AEGIS OS - NFTABLES FIREWALL CONFIGURATION
# ==========================================

flush ruleset

# Standard IPv4/IPv6 Stateful Firewall Table
table inet filter {
    chain input {
        type filter hook input priority filter; policy drop;

        # Allow local loopback traffic
        iif "lo" accept

        # Drop invalid state connections
        ct state invalid drop

        # Accept traffic from established/related connections
        ct state established,related accept

        # Stealth Mode: Reject incoming ping requests with rate limits, or drop them
        # We drop them entirely to be invisible to network port scans
        ip protocol icmp drop
        ip6 nexthdr ipv6-icmp drop
    }

    chain forward {
        # Drop all forward traffic by default (protects containers unless explicitly bridged)
        type filter hook forward priority filter; policy drop;
        
        # Allow Waydroid container forwarding if bridge interface 'anbox0' or 'waydroid0' exists
        iifname "waydroid0" oifname "wlan*" accept
        iifname "waydroid0" oifname "eth*" accept
        iifname "wlan*" oifname "waydroid0" ct state established,related accept
        iifname "eth*" oifname "waydroid0" ct state established,related accept
    }

    chain output {
        # Allow all outgoing traffic by default (hardened in Tor mode via custom script)
        type filter hook output priority filter; policy accept;
    }
}
