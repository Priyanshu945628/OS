# =====================================================================
# AEGIS OS - KERNEL SYSCTL SECURITY HARDENING
# =====================================================================

# 1. Process Sandboxing & debugging limits
# Restricts ptrace (process tracing) to prevent unauthorized reading of memory 
# from other processes (mitigates credentials dumping/injection).
# 2 = Admin-only ptrace (processes need CAP_SYS_PTRACE).
kernel.yama.ptrace_scope = 2

# 2. Kernel Log Restrictions
# Restricts dmesg logs to root user to prevent kernel pointer leaks.
kernel.dmesg_restrict = 1

# Restrict user access to kernel symbol locations in /proc
kernel.kptr_restrict = 2

# 3. Memory Security
# Enforce Address Space Layout Randomization (ASLR).
kernel.randomize_va_space = 2

# Harden Berkeley Packet Filter (BPF) JIT compiler against exploit payloads.
net.core.bpf_jit_harden = 2

# Disable Magic SysRq hotkeys to prevent bypass of lock screens.
kernel.sysrq = 0

# 4. Network Stack Security (IPV4 & IPV6 Hardening)
# Enable TCP SYN Cookies to prevent SYN Flood Denial of Service (DoS) attacks.
net.ipv4.tcp_syncookies = 1

# Enforce Reverse Path Filtering (prevents IP spoofing).
net.ipv4.conf.all.rp_filter = 1
net.ipv4.conf.default.rp_filter = 1

# Disable ICMP Redirect acceptance (mitigates man-in-the-middle redirection).
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0
net.ipv6.conf.all.accept_redirects = 0
net.ipv6.conf.default.accept_redirects = 0

# Do not send ICMP redirects.
net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.default.send_redirects = 0

# Ignore ICMP Echo broadcasts (prevents smurf amplification attacks).
net.ipv4.icmp_echo_ignore_broadcasts = 1

# Disable Source Routing (prevents routing control by sender).
net.ipv4.conf.all.accept_source_route = 0
net.ipv4.conf.default.accept_source_route = 0
net.ipv6.conf.all.accept_source_route = 0
net.ipv6.conf.default.accept_source_route = 0

# 5. Filesystem Protection
# Prevent unprivileged users from creating hardlinks/symlinks to files they do not own.
fs.protected_hardlinks = 1
fs.protected_symlinks = 1
fs.protected_fifos = 2
fs.protected_regular = 2
